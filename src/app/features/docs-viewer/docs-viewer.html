<!-- app/docs-viewer/docs-viewer.html -->

<div class="docs-viewer" #docsViewer>

  <!-- Header -->
  <header class="dv-header">
    <div class="dv-title">{{ $docId() }}</div>

    <nav class="dv-nav">
      <!-- Regular Style -->
      <!-- <button class="theme-toggle-btn" (click)="onToggleTheme()" matTooltip="Toggle theme">
        <span class="theme-icon"></span>
      </button> -->

      <!-- VSCODE Style -->
      <div class="div-button">
        <button class="vscode-toggle" (click)="onToggleTheme()">
          <div class="vscode-toggle-track">
            <div class="vscode-toggle-thumb">
              <span class="icon sun">☀️</span>
              <span class="icon moon">🌙</span>
            </div>
          </div>
        </button>

        <button (click)="backToIndex()">Back to Index</button>
        <button (click)="reloadDoc()">Reload</button>
        <button class="dv-artifacts-panel-toggle" (click)="toggleArtifacts()">Artifacts</button>
        <!-- <button class="dv-artifacts-toggle" (click)="toggleArtifacts()">Artifacts</button> -->
      </div>
    </nav>
  </header>

  <div class="progress-bar">
    <!-- <div class="progress-fill" [style.width.%]="scrollService.scrollPercent()"></div> -->
  </div>


  <div class="dv-body">

    <!-- Table of Contents -->
    @if (toc.length) {
    <aside class="dv-toc">
      <ul>
        @for (item of toc; track item.slug) {
        <li [class.active]="$activeHeading() === item.slug">
          <a (click)="scrollTo(item.slug)">{{ item.text }}</a>
        </li>
        }
      </ul>
    </aside>
    }

    <!-- Main content -->
    <main class="dv-content">
      <div #host class="dv-host"></div>
    </main>

  </div>

  <!-- Debug Overlay -->
  <!-- @if (debugOverlay && $showDebugOverlay()) {
  <div class="dv-debug-overlay" #debugOverlayHost></div>
  } -->
  <div class="dv-debug-overlay hidden" #debugOverlayHost></div>

  <!-- Artifacts Panel -->
  <!-- @if (artifactsPanel && $showArtifacts()) {
  <div class="dv-artifacts-panel" #artifactsHost>
    <p>Working!</p>
  </div>
  } -->

  <div class="dv-artifacts-panel hidden" #artifactsHost></div>


</div>
