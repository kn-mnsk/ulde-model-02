<!-- app/features/docs-viewer/theme-toggle/theme-toggle.html -->

<!-- <p>theme-toggle works!</p> -->

<button class="vscode-toggle" (click)="toggle()">
  <div class="vscode-toggle-track">
    <div class="vscode-toggle-thumb" [class.dark]="isDark()">
      <span class="icon sun">☀️</span>
      <span class="icon moon">🌙</span>
    </div>
  </div>
</button>
